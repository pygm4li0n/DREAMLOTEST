<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dreamlo · Leaderboard</title>
    <style>
        /* ── reset & base ── */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: #0b0e14;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            color: #e8edf5;
        }
        .card {
            max-width: 760px;
            width: 100%;
            background: #141a24;
            border-radius: 2rem;
            padding: 2rem 2.2rem 2.6rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a3344;
            transition: 0.2s;
        }
        h1 {
            font-size: 1.9rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #b7c9ff, #7aa3ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .sub {
            color: #7e8aa8;
            font-size: 0.85rem;
            margin-bottom: 2rem;
            border-left: 3px solid #2a3a5a;
            padding-left: 0.9rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
        }
        .sub span {
            background: #1f293b;
            padding: 0.15rem 0.7rem;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            letter-spacing: 0.02em;
            color: #9bb1d9;
        }

        /* ── form ── */
        .form-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
            margin-bottom: 1.8rem;
        }
        .form-group {
            flex: 1 1 180px;
            min-width: 140px;
        }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #7e8aa8;
            margin-bottom: 0.25rem;
            font-weight: 600;
        }
        .form-group input {
            width: 100%;
            padding: 0.7rem 1rem;
            background: #1a2330;
            border: 1px solid #2d3a4e;
            border-radius: 14px;
            color: #e8edf5;
            font-size: 1rem;
            transition: 0.2s;
            outline: none;
            font-weight: 500;
        }
        .form-group input:focus {
            border-color: #5a7fd4;
            box-shadow: 0 0 0 3px rgba(90, 127, 212, 0.2);
            background: #1e293b;
        }
        .form-group input::placeholder {
            color: #4a5a78;
            font-weight: 400;
            font-size: 0.9rem;
        }
        .btn {
            background: #2d4a8a;
            border: none;
            border-radius: 14px;
            padding: 0.7rem 2rem;
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            align-self: flex-end;
            margin-bottom: 0.2rem;
            border: 1px solid #3e5fa0;
        }
        .btn:hover {
            background: #3a5daa;
            transform: scale(1.01);
            border-color: #5a7fd4;
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            filter: grayscale(0.4);
        }
        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* ── status / messages ── */
        .msg {
            padding: 0.6rem 1rem;
            border-radius: 12px;
            margin-bottom: 1.4rem;
            font-size: 0.9rem;
            display: none;
            align-items: center;
            gap: 0.6rem;
            background: #1a2330;
            border-left: 4px solid #4a6a9a;
        }
        .msg.show {
            display: flex;
        }
        .msg.error {
            border-left-color: #d45a5a;
            background: #2a1a1a;
            color: #ffb3b3;
        }
        .msg.success {
            border-left-color: #4ac78a;
            background: #142a1e;
            color: #a3f0c5;
        }
        .msg.info {
            border-left-color: #5a7fd4;
            background: #1a233a;
            color: #b7c9ff;
        }

        /* ── leaderboard ── */
        .lb-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin: 1.8rem 0 0.8rem 0;
            padding-bottom: 0.4rem;
            border-bottom: 1px solid #1f2a3a;
        }
        .lb-header h2 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #c8d6f0;
        }
        .lb-header .count {
            font-size: 0.75rem;
            color: #5e749a;
            background: #1a2330;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
        }
        .lb-refresh {
            background: none;
            border: none;
            color: #5e749a;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            transition: 0.2s;
        }
        .lb-refresh:hover {
            color: #b7c9ff;
            background: #1f293b;
        }

        .lb-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            max-height: 380px;
            overflow-y: auto;
            padding-right: 0.2rem;
        }
        .lb-list::-webkit-scrollbar {
            width: 4px;
        }
        .lb-list::-webkit-scrollbar-track {
            background: #0f1620;
            border-radius: 10px;
        }
        .lb-list::-webkit-scrollbar-thumb {
            background: #2d3a4e;
            border-radius: 10px;
        }

        .lb-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.6rem 1rem;
            background: #111a26;
            border-radius: 12px;
            border: 1px solid #1f293b;
            transition: 0.15s;
        }
        .lb-item:hover {
            background: #17212f;
            border-color: #2a3a5a;
        }
        .lb-rank {
            font-weight: 700;
            font-size: 0.8rem;
            color: #5e749a;
            min-width: 28px;
            text-align: center;
        }
        .lb-rank.gold {
            color: #f7c948;
        }
        .lb-rank.silver {
            color: #a8b8d8;
        }
        .lb-rank.bronze {
            color: #cd8f6b;
        }
        .lb-name {
            flex: 1;
            font-weight: 500;
            color: #d6e0f5;
            word-break: break-word;
        }
        .lb-score {
            font-weight: 700;
            font-size: 1.1rem;
            color: #8bb3ff;
            background: #1a2538;
            padding: 0.1rem 0.9rem;
            border-radius: 40px;
            font-variant-numeric: tabular-nums;
        }
        .lb-empty {
            color: #4a5a78;
            text-align: center;
            padding: 2rem 0;
            font-size: 0.95rem;
        }

        /* ── responsive ── */
        @media (max-width: 540px) {
            .card {
                padding: 1.5rem;
            }
            .form-row {
                flex-direction: column;
            }
            .btn {
                width: 100%;
                justify-content: center;
            }
            .lb-item {
                flex-wrap: wrap;
                gap: 0.3rem;
            }
            .lb-score {
                font-size: 0.95rem;
                padding: 0.05rem 0.7rem;
            }
        }
    </style>
</head>
<body>

    <div class="card" id="app">

        <!-- header -->
        <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
            <h1>🏆 Leaderboard</h1>
            <button class="lb-refresh" id="refreshBtn" title="Refresh leaderboard">⟳ refresh</button>
        </div>
        <div class="sub">
            <span>board: 6a56…e8bd</span>
            <span id="statusBadge">● live</span>
        </div>

        <!-- message -->
        <div class="msg" id="msg"></div>

        <!-- form -->
        <form id="scoreForm" class="form-row">
            <div class="form-group">
                <label for="nameInput">Player name</label>
                <input type="text" id="nameInput" placeholder="e.g. Alex" autocomplete="off" required />
            </div>
            <div class="form-group">
                <label for="scoreInput">Score</label>
                <input type="number" id="scoreInput" placeholder="0" min="0" step="1" required />
            </div>
            <button type="submit" class="btn" id="submitBtn">
                <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4v12m-4-4l4 4 4-4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
                Submit
            </button>
        </form>

        <!-- leaderboard -->
        <div class="lb-header">
            <h2>Rankings</h2>
            <span class="count" id="countLabel">0 entries</span>
        </div>
        <ul class="lb-list" id="lbList">
            <li class="lb-empty">Loading records …</li>
        </ul>

    </div>

    <script>
        (function() {
            'use strict';

            // ─── CONFIG ─────────────────────────────────────────────────────────
            const BOARD_ID = '6a5628c58f40bc13189ae8bd';
            const PRIVATE_KEY = 'A7Nc4ucYkkin6hLt9rQl1wNlZLE23CJkKDqgdn6_R9ig';

            const WRITE_URL =
                `https://dreamlo.com/lb/${BOARD_ID}/add/`;
            const READ_URL =
                `https://dreamlo.com/lb/${BOARD_ID}/json/`;

            // ─── DOM refs ──────────────────────────────────────────────────────
            const form = document.getElementById('scoreForm');
            const nameInput = document.getElementById('nameInput');
            const scoreInput = document.getElementById('scoreInput');
            const submitBtn = document.getElementById('submitBtn');
            const lbList = document.getElementById('lbList');
            const countLabel = document.getElementById('countLabel');
            const msgEl = document.getElementById('msg');
            const refreshBtn = document.getElementById('refreshBtn');
            const statusBadge = document.getElementById('statusBadge');

            // ─── helpers ──────────────────────────────────────────────────────
            function showMessage(text, type = 'info') {
                msgEl.textContent = text;
                msgEl.className = 'msg show ' + type;
            }

            function hideMessage() {
                msgEl.className = 'msg';
                msgEl.textContent = '';
            }

            function setLoading(loading) {
                submitBtn.disabled = loading;
                submitBtn.textContent = loading ? 'Sending …' : 'Submit';
                if (!loading) {
                    // restore icon
                    submitBtn.innerHTML = `
                        <svg viewBox="0 0 24 24" width="18" height="18"><path d="M12 4v12m-4-4l4 4 4-4"/><path d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
                        Submit
                    `;
                }
            }

            // ─── fetch leaderboard ────────────────────────────────────────────
            async function fetchLeaderboard() {
                try {
                    const resp = await fetch(READ_URL, {
                        mode: 'cors',
                        headers: { 'Accept': 'application/json' },
                    });

                    if (!resp.ok) {
                        throw new Error(`HTTP ${resp.status} — ${resp.statusText}`);
                    }

                    const data = await resp.json();
                    return data;
                } catch (err) {
                    console.warn('[Dreamlo] read error:', err);
                    throw err;
                }
            }

            // ─── render leaderboard ──────────────────────────────────────────
            function renderLeaderboard(data) {
                // data is expected to be an array of { name, score } or empty
                if (!Array.isArray(data) || data.length === 0) {
                    lbList.innerHTML = `<li class="lb-empty">✨ No records yet — be the first!</li>`;
                    countLabel.textContent = '0 entries';
                    return;
                }

                // sort descending by score (highest first)
                const sorted = [...data].sort((a, b) => (b.score || 0) - (a.score || 0));

                let html = '';
                sorted.forEach((item, idx) => {
                    const rank = idx + 1;
                    let rankClass = 'lb-rank';
                    if (rank === 1) rankClass += ' gold';
                    else if (rank === 2) rankClass += ' silver';
                    else if (rank === 3) rankClass += ' bronze';

                    const name = item.name || 'Anonymous';
                    const score = typeof item.score === 'number' ? item.score : 0;

                    html += `
                        <li class="lb-item">
                            <span class="${rankClass}">#${rank}</span>
                            <span class="lb-name">${escapeHtml(name)}</span>
                            <span class="lb-score">${Number(score).toLocaleString()}</span>
                        </li>
                    `;
                });

                lbList.innerHTML = html;
                countLabel.textContent = `${sorted.length} entry${sorted.length !== 1 ? 's' : ''}`;
            }

            // simple escape to prevent XSS
            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            // ─── load & display ──────────────────────────────────────────────
            async function loadLeaderboard(showStatus = true) {
                if (showStatus) {
                    statusBadge.textContent = '⟳ loading …';
                    statusBadge.style.color = '#b7c9ff';
                }
                try {
                    const data = await fetchLeaderboard();
                    renderLeaderboard(data);
                    if (showStatus) {
                        statusBadge.textContent = '● synced';
                        statusBadge.style.color = '#4ac78a';
                    }
                    hideMessage();
                } catch (err) {
                    console.error(err);
                    lbList.innerHTML = `<li class="lb-empty">⚠️ Could not load leaderboard</li>`;
                    countLabel.textContent = '—';
                    if (showStatus) {
                        statusBadge.textContent = '● error';
                        statusBadge.style.color = '#d45a5a';
                    }
                    showMessage('Failed to fetch records: ' + err.message, 'error');
                }
            }

            // ─── submit score ─────────────────────────────────────────────────
            async function submitScore(name, score) {
                // trim and validate
                const cleanName = name.trim().slice(0, 60);
                if (!cleanName) {
                    showMessage('Please enter a player name.', 'error');
                    return false;
                }
                const numScore = Number(score);
                if (!Number.isFinite(numScore) || numScore < 0) {
                    showMessage('Please enter a valid score (0 or greater).', 'error');
                    return false;
                }

                // Dreamlo expects URL-encoded name & score
                const encodedName = encodeURIComponent(cleanName);
                const encodedScore = encodeURIComponent(Math.floor(numScore));

                const url = `${WRITE_URL}${encodedName}/${encodedScore}/${PRIVATE_KEY}`;

                setLoading(true);
                hideMessage();

                try {
                    const resp = await fetch(url, {
                        mode: 'cors',
                        method: 'GET', // Dreamlo uses GET for writes
                        headers: { 'Accept': 'text/plain' },
                    });

                    const text = await resp.text();

                    if (!resp.ok) {
                        throw new Error(`HTTP ${resp.status} — ${text || resp.statusText}`);
                    }

                    // Dreamlo returns "OK" on success
                    if (text.trim().toUpperCase() === 'OK') {
                        showMessage(`✅ Record saved! ${cleanName} · ${Math.floor(numScore).toLocaleString()}`, 'success');
                        // clear inputs
                        nameInput.value = '';
                        scoreInput.value = '';
                        // refresh leaderboard
                        await loadLeaderboard(true);
                        return true;
                    } else {
                        // sometimes returns error message
                        throw new Error(text.trim() || 'Unknown error from server');
                    }

                } catch (err) {
                    console.error('[Dreamlo] write error:', err);
                    showMessage(`❌ Submission failed: ${err.message}`, 'error');
                    return false;
                } finally {
                    setLoading(false);
                }
            }

            // ─── event listeners ─────────────────────────────────────────────

            // form submit
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const name = nameInput.value;
                const score = scoreInput.value;
                await submitScore(name, score);
            });

            // refresh button
            refreshBtn.addEventListener('click', () => {
                loadLeaderboard(true);
            });

            // auto-refresh on first load & every 45s
            loadLeaderboard(true);
            const autoRefreshInterval = setInterval(() => {
                loadLeaderboard(false); // silent refresh
            }, 45000);

            // clean up interval if page unloads (optional)
            window.addEventListener('beforeunload', () => {
                clearInterval(autoRefreshInterval);
            });

            // also refresh when user comes back to tab (visibility change)
            document.addEventListener('visibilitychange', () => {
                if (!document.hidden) {
                    loadLeaderboard(false);
                }
            });

            // ─── expose for console debugging ──────────────────────────────
            window.__dreamlo = {
                boardId: BOARD_ID,
                privateKey: PRIVATE_KEY,
                fetch: fetchLeaderboard,
                submit: submitScore,
                reload: loadLeaderboard,
            };

            console.log('🏆 Dreamlo leaderboard ready!');
            console.log(`   board: ${BOARD_ID}`);
            console.log(`   write: ${WRITE_URL}NAME/SCORE/${PRIVATE_KEY}`);
            console.log(`   read:  ${READ_URL}`);
            console.log('   use window.__dreamlo for manual control');

        })();
    </script>

</body>
</html>
